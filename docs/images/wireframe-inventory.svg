  <line x1="0" y1="484" x2="780" y2="484" stroke="#CDDAE2" stroke-width="1"/>
  <text x="390" y="507" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8C99A6" text-anchor="middle" font-style="italic">Placeholder — screenshot coming soon</text>
