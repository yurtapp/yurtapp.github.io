<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" width="780" height="520" role="img" aria-label="Recurring bills screenshot placeholder">
  <!-- Card background -->
  <rect width="780" height="520" rx="14" fill="#F7F8F8" stroke="#CDDAE2" stroke-width="1.5"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="780" height="44" rx="14" fill="#E8EAED"/>
  <rect x="0" y="26" width="780" height="18" fill="#E8EAED"/>
  <circle cx="22" cy="22" r="7" fill="#FC5753"/>
  <circle cx="44" cy="22" r="7" fill="#FEBC2E"/>
  <circle cx="66" cy="22" r="7" fill="#34C748"/>
  <rect x="160" y="13" width="460" height="18" rx="5" fill="white" stroke="#CDDAE2" stroke-width="1"/>
  <text x="390" y="26.5" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8C99A6" text-anchor="middle">app.getyurt.com/bills</text>

  <!-- App nav bar -->
  <rect x="0" y="44" width="780" height="52" fill="#00343D"/>
  <text x="28" y="76" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="800" fill="white">Yurt</text>
  <text x="90" y="76" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">Expenses</text>
  <text x="162" y="76" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="rgba(255,255,255,0.35)">Inventory</text>
  <text x="242" y="76" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="rgba(255,255,255,0.5)">Bills</text>
  <rect x="236" y="91" width="38" height="3" rx="2" fill="#1DAF8B"/>

  <!-- Page heading -->
  <text x="28" y="134" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#3A3F50">Recurring Bills</text>
  <text x="28" y="156" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#8C99A6">February 2025 · $3,108 / mo total</text>

  <!-- Add button -->
  <rect x="606" y="116" width="150" height="34" rx="5" fill="#0066DB"/>
  <text x="681" y="138" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" font-weight="600" fill="white" text-anchor="middle">+ Add Bill</text>

  <!-- Summary row -->
  <rect x="28" y="170" width="340" height="70" rx="10" fill="white" stroke="#CDDAE2" stroke-width="1"/>
  <text x="46" y="192" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#8C99A6" letter-spacing="0.8">MONTHLY TOTAL</text>
  <text x="46" y="222" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="800" fill="#3A3F50">$3,108</text>

  <rect x="380" y="170" width="372" height="70" rx="10" fill="white" stroke="#CDDAE2" stroke-width="1"/>
  <text x="398" y="192" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="600" fill="#8C99A6" letter-spacing="0.8">DUE THIS WEEK</text>
  <rect x="398" y="200" width="14" height="14" rx="4" fill="#FC5753"/>
  <text x="420" y="211" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#3A3F50">Internet — $79 due Feb 25</text>

  <!-- Bills list header -->
  <rect x="28" y="258" width="724" height="28" rx="6" fill="#F0F2F4"/>
  <text x="72" y="276" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#8C99A6" letter-spacing="0.8">BILL</text>
  <text x="380" y="276" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#8C99A6" letter-spacing="0.8">DUE DATE</text>
  <text x="540" y="276" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#8C99A6" letter-spacing="0.8">FREQUENCY</text>
  <text x="742" y="276" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="#8C99A6" letter-spacing="0.8" text-anchor="end">AMOUNT</text>

  <!-- Bill rows -->
  <!-- Row 1: Mortgage -->
  <rect x="28" y="286" width="724" height="44" fill="white"/>
  <line x1="28" y1="330" x2="752" y2="330" stroke="#CDDAE2" stroke-width="0.5"/>
  <circle cx="52" cy="308" r="13" fill="#E4F0FE"/>
  <text x="52" y="313" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" text-anchor="middle">🏠</text>
  <text x="76" y="312" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#3A3F50">Mortgage</text>
  <text x="380" y="312" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#3A3F50">1st of month</text>
  <text x="540" y="312" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8C99A6">Monthly</text>
  <text x="742" y="312" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#3A3F50" text-anchor="end">$1,847.00</text>

  <!-- Row 2: Electric -->
  <rect x="28" y="330" width="724" height="44" fill="#FAFAFA"/>
  <line x1="28" y1="374" x2="752" y2="374" stroke="#CDDAE2" stroke-width="0.5"/>
  <circle cx="52" cy="352" r="13" fill="#FCF0AD"/>
  <text x="52" y="357" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" text-anchor="middle">⚡</text>
  <text x="76" y="356" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#3A3F50">Electric</text>
  <text x="380" y="356" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#3A3F50">12th of month</text>
  <text x="540" y="356" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8C99A6">Monthly</text>
  <text x="742" y="356" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#3A3F50" text-anchor="end">$142.00</text>

  <!-- Row 3: Internet (UPCOMING - highlighted) -->
  <rect x="28" y="374" width="724" height="44" fill="rgba(252, 240, 173, 0.25)"/>
  <line x1="28" y1="418" x2="752" y2="418" stroke="#CDDAE2" stroke-width="0.5"/>
  <circle cx="52" cy="396" r="13" fill="#FCF0AD"/>
  <text x="52" y="401" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" text-anchor="middle">🌐</text>
  <text x="76" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#3A3F50">Internet</text>
  <rect x="150" y="390" width="54" height="16" rx="8" fill="#FC5753"/>
  <text x="177" y="401" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" font-weight="700" fill="white" text-anchor="middle">DUE SOON</text>
  <text x="380" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#3A3F50">25th of month</text>
  <text x="540" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8C99A6">Monthly</text>
  <text x="742" y="400" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#3A3F50" text-anchor="end">$79.00</text>

  <!-- Row 4: Insurance -->
  <rect x="28" y="418" width="724" height="44" fill="white"/>
  <line x1="28" y1="462" x2="752" y2="462" stroke="#CDDAE2" stroke-width="0.5"/>
  <circle cx="52" cy="440" r="13" fill="#E4F0FE"/>
  <text x="52" y="445" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" text-anchor="middle">🛡️</text>
  <text x="76" y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#3A3F50">Home Insurance</text>
  <text x="380" y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#3A3F50">15th of month</text>
  <text x="540" y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="12" fill="#8C99A6">Monthly</text>
  <text x="742" y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="700" fill="#3A3F50" text-anchor="end">$180.00</text>

  <!-- Placeholder label bar -->
  <rect x="0" y="484" width="780" height="36" fill="rgba(0,0,0,0.04)"/>
  <line x1="0" y1="484" x2="780" y2="484" stroke="#CDDAE2" stroke-width="1"/>
  <text x="390" y="507" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#8C99A6" text-anchor="middle" font-style="italic">Placeholder — screenshot coming soon</text>
</svg>
